[server]
# Polling interval in seconds for webcam checks (must be >= 5).
# (Microphone monitoring is event-driven and unaffected by this value.)
check_interval=30

# Notification timeout in seconds. 0 = manual dismissal.
notification_timeout=5

# Maximum size in bytes of the events log before it is rotated.
# One backup is kept (events.log.1). 0 or unset = 256 KiB.
log_max_bytes=262144

# Optional PipeWire node or application substring filter for the mic.
# Examples:
#   microphone_device=alsa_input.pci-0000_00_1f.3.analog-stereo
#   microphone_device=Firefox
# If unset or empty, any active capture node triggers a mic event.
microphone_device=

[policy]
# Semicolon-separated lists of process names matched against the comm of the
# process holding the device. Order: deny_list always notifies; allow_list
# suppresses notifications; otherwise the default is to notify.
# Example: allow_list=zoom;teams;
#          deny_list=firefox;chromium;

# Webcam policies
allow_list=
deny_list=

# Microphone policies
mic_allow_list=
mic_deny_list=
